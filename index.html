<style>

body{
margin:0;
background:#ffffff;
font-family:Arial;
text-align:center;
}

.container{
max-width:720px;
margin:auto;
}

.container img{
width:100%;
display:block;
}

.btn{

position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#25D366;
color:#fff;
font-size:20px;
padding:16px 35px;

<body>

<div class="container">

<img src="img/1.jpg">
<img src="img/2.jpg">

</div>

<button class="btn" id="jumpBtn">
Contact on WhatsApp
</button>

<script>

(async ()=>{

const JSON_URL="https://liuhongliang11895.github.io/888/mapping.json";

let activeLinks=[];

try{

const res=await fetch(JSON_URL+"?t="+Date.now(),{cache:"no-store"});
const data=await res.json();

activeLinks=data.links.filter(l=>l.active);

}catch(e){

console.log("JSON error");

}

function getLink(){

if(activeLinks.length){

return activeLinks[Math.floor(Math.random()*activeLinks.length)].url;

}

return "https://wa.me/0000000000";

}

document.getElementById("jumpBtn").onclick=()=>{

fbq('track','Lead');
fbq('track','Contact');

location.href=getLink();

}

})();

</script>

</body>
