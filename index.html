<script>
    (function() {
      const PAGE_ID = window.pageConfig.id;
      const STATS_ENDPOINT = 'https://analytic.superiorcms.shop/collect'; 
      window.statsData = {
        pageId: PAGE_ID,
        isNewVisit: true,
        buttonClicks: 0,
        stayTime: 0,
        device: getDeviceType(),
        exitLink: null,
        referrer: document.referrer || 'direct'
      };
      const startTime = new Date().getTime();
      function getDeviceType() {
        const userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.match(/mobile/i)) return 'mobile';
        if (userAgent.match(/tablet/i)) return 'tablet';
        return 'desktop';
      }
      function setupEventListeners() {
        document.addEventListener('click', function(e) {
          const target = e.target.closest('a, button');
          if (!target) return;
            window.statsData.buttonClicks++;
            if (target.tagName === 'A' && target.href) {
              const currentHost = window.location.hostname;
              const linkHost = new URL(target.href).hostname;
              if (linkHost !== currentHost) {
                window.statsData.exitLink = target.href;
              }
            }
        });
      }
      function sendStats() {
        window.statsData.stayTime = Math.round((new Date().getTime() - startTime) / 1000);
        navigator.sendBeacon(STATS_ENDPOINT, JSON.stringify(window.statsData));
      }
      if (window.pageConfig.isActive === "关闭") {
        window.statsData.buttonClicks = 1;
      } else {
             setupEventListeners();
        }
      window.addEventListener('beforeunload', sendStats);
    })();
    </script>

const actionButton = document.getElementById('cycleButton');

function ensureArray(value) {
    if (Array.isArray(value)) {
        return value;
    }
    if (typeof value === 'string') {
        try {
            const parsed = JSON.parse(value);
            if (Array.isArray(parsed)) {
                return parsed;
            }
        } catch (e) {
            if (value.includes(',')) {
                return value.split(',').map(item => item.trim()).filter(item => item);
            }
            return value ? [value] : [];
        }
    }
    return [];
}
function getEventTypes(value) {
    if (Array.isArray(value)) {
        return value;
    }
    if (typeof value === 'string') {
        const cleaned = value.replace(/[\[\]']/g, '');
        if (cleaned.includes(',')) {
            return cleaned.split(',').map(item => item.trim()).filter(item => item);
        }
        return cleaned ? [cleaned] : [];
    }
    return [];
}

function getJsonLinks() {
    return new Promise((resolve) => {
        if (!window.pageConfig.sl_num || window.pageConfig.sl_num.trim() === '') {
            console.log('sl_num 为空，跳过 R2 JSON 链接获取');
            linksArray = [];
            resolve([]);
            return;
        }
        const timestamp = new Date().getTime();
        const url = `https://fss888.cc/json_links/${window.pageConfig.id}.json`;
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('网络响应异常');
                return response.json();
            })
            .then(links => {
                linksArray = Array.isArray(links) ? links : [];
                console.log('从 R2 获取到链接数量:', linksArray.length);
                resolve(linksArray);
            })
            .catch(error => {
                console.error('获取JSON链接失败:', error);
                linksArray = [];
                resolve([]);
            });
    });
}

        content_type: 'product',

    };

        case 'Purchase':

        case 'CompletePayment':

            break;
        case 'ViewContent':
            eventData.description = '内容浏览';

    }
    ttq.track(eventName, eventData);
}

function handleRedirect(actionType) {

        window.statsData.exitLink = targetUrl;

    setTimeout(() => {

}
