<script>
const MAIN_JSON_URL = "https://liuhongliang11895.github.io/888/mapping.json";
const FALLBACK_LINK = "https://example.com";

async function getLinkFromRepo() {
  try {
    const res = await fetch(MAIN_JSON_URL + "?ts=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("JSON not found");
    const data = await res.json();
    const activeLinks = data.links.filter(l => l.active);
    if (!activeLinks.length) throw new Error("No active links");
    return activeLinks[Math.floor(Math.random() * activeLinks.length)].url;
  } catch (e) {
    console.error("拉取 JSON 失败:", e);
    return FALLBACK_LINK;
  }
}

document.getElementById("jumpBtn").onclick = async function(){
  fbq('track','Lead');
  fbq('track','CompleteRegistration');
  const url = await getLinkFromRepo();
  location.href = url;
};
</script>
